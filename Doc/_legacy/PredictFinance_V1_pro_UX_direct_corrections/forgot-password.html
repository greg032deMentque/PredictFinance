<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login - PredictFinance V1</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="assets/style.css" rel="stylesheet">
</head>
<body>
  
<div class="auth-only">
  <div class="auth-shell">
    <div class="auth-side">
      <span class="chip bg-white text-dark mb-3"><i class="bi bi-key"></i> Mot de passe oublié</span>
      <h1 class="display-6 fw-bold mb-3">Récupération simple et rassurante</h1>
      <p class="text-white-50 fs-5 mb-4">Le flow donne une prochaine étape claire, sans jargon, sans montrer le shell applicatif principal.</p>
    </div>
    <div class="auth-card">
      <div class="mb-4">
        <span class="chip chip-navy mb-2"><i class="bi bi-envelope"></i> Réinitialisation</span>
        <h2 class="h3 fw-bold mb-2">Recevoir un lien</h2>
        <p class="muted mb-0">Saisis ton email pour recevoir un lien de réinitialisation.</p>
      </div>
      <div class="mb-4"><label class="form-label fw-semibold">Email</label><input class="form-control form-control-lg" type="email" placeholder="nom@exemple.com"></div>
      <div class="d-grid gap-2">
        <a class="btn btn-lg btn-primary rounded-4 cta-primary" href="reset-password.html">Envoyer le lien</a>
        <a class="btn btn-outline-secondary rounded-4" href="login.html">Retour à la connexion</a>
      </div>
    </div>
  </div>
</div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
