<body class="d-flex flex-column min-vh-100">
  <header class="navbar navbar-light bg-light shadow-sm">
    <div
      class="container-fluid d-flex align-items-center justify-content-between"
    >
      <div class="d-flex align-items-center gap-2">
        <img src="assets/money.svg" alt="Logo app" class="login-logo" />
      </div>

      <span
        class="fw-bold text-vert text-center"
        style="font-size: 25px; cursor: pointer"
      >
        {{ headerTitle() }}
      </span>

      @if (showPrivateShell()) {
        <div class="dropdown">
          <i
            class="bi bi-person-circle fs-2 text-primary"
            role="button"
            data-bs-toggle="dropdown"
            aria-expanded="false"
            style="cursor: pointer"
          ></i>

          <ul
            class="dropdown-menu dropdown-menu-end shadow-sm p-2"
            style="min-width: 280px"
          >
            <li class="px-2 py-2">
              <div class="d-flex align-items-center gap-2">
                <i class="bi bi-person-circle fs-2 text-primary"></i>
                <div>
                  <div class="fw-semibold">{{ userDisplayName() }}</div>
                  <div class="text-muted small">{{ userSubtitle() }}</div>
                </div>
              </div>
            </li>

            <li><hr class="dropdown-divider my-2" /></li>

            @for (l of profileLinks(); track l.label) {
              <li>
                <a
                  class="dropdown-item d-flex align-items-center gap-2 rounded-2"
                  [routerLink]="l.commands"
                >
                  <i class="bi" [class]="l.icon"></i>
                  {{ l.label }}
                </a>
              </li>
            }
          </ul>
        </div>
      } @else {
        <div style="width: 115px"></div>
      }
    </div>
  </header>

  @if (showPrivateShell()) {
    <div class="container-fluid flex-fill">
      <div class="row" style="height: calc(100% - 40px) !important">
        <main
          class="col-12 col-lg-9 col-xl-10 py-3 pb-5 overflow-auto"
          style="overflow-x: hidden !important"
        >
          <router-outlet></router-outlet>
        </main>
      </div>
    </div>
  } @else {
    <main
      class="flex-fill overflow-auto pb-5"
      style="overflow-x: hidden !important"
    >
      <router-outlet></router-outlet>
    </main>
  }

  <footer class="footer text-center py-2 shadow-sm">© Moi in 2026</footer>
</body>
