<div class="app-root d-flex flex-column min-vh-100">
  <header class="navbar app-header">
    <div class="container-fluid d-flex align-items-center justify-content-between">
      <div class="d-flex align-items-center gap-2">
        <img src="assets/money.svg" alt="Logo app" class="login-logo" />
      </div>

      <span class="app-header-title text-center">
        {{ headerTitle() }}
      </span>

      @if (showPrivateShell()) {
        <div class="d-flex align-items-center gap-2">
          <a [routerLink]="['/', appRoutes.ClientRoot, appRoutes.Account, appRoutes.Profile]" aria-label="Mon profil">
            <i class="bi bi-person-circle fs-2 app-profile-toggle" role="img"></i>
          </a>

          <button type="button" class="btn btn-outline-secondary rounded-pill app-logout-btn" (click)="logout()" aria-label="Déconnexion">
            <i class="bi bi-box-arrow-right"></i>
            <span class="d-none d-sm-inline ms-2">Déconnexion</span>
          </button>
        </div>
      } @else {
        <div class="app-header-spacer"></div>
      }
    </div>
  </header>

  @if (showPrivateShell()) {
    <div class="app-private flex-fill d-flex flex-column">
      <router-outlet></router-outlet>
    </div>
  } @else {
    <main class="app-public-main flex-fill overflow-auto pb-5">
      <router-outlet></router-outlet>
    </main>
  }

  <footer class="footer text-center py-2">
    <i class="bi bi-graph-up-arrow"></i> FinInsight
  </footer>
</div>
