<section class="d-flex flex-column gap-4">
  <div>
    <p class="text-uppercase text-muted mb-1">Administration</p>
    <h1 class="h4 mb-0">{{ title }}</h1>
  </div>

  <div class="card border-0 shadow-sm">
    <div class="card-body p-4">
      @if (loading) {
        <div class="text-muted mb-3">
          <span class="spinner-border spinner-border-sm me-2" aria-hidden="true"></span>
          Chargement utilisateur...
        </div>
      }

      <form [formGroup]="form" (ngSubmit)="submit()" class="row g-3">
        <div class="col-md-6">
          <label class="form-label">Prenom</label>
          <input class="form-control" type="text" formControlName="firstName" />
        </div>

        <div class="col-md-6">
          <label class="form-label">Nom</label>
          <input class="form-control" type="text" formControlName="lastName" />
        </div>

        <div class="col-12">
          <label class="form-label">Email</label>
          <input class="form-control" type="email" formControlName="email" />
        </div>

        @if (!isEdit) {
          <div class="col-12">
            <label class="form-label">Mot de passe initial</label>
            <input class="form-control" type="password" formControlName="password" />
          </div>
        }

        <div class="col-md-6">
          <label class="form-label">Role</label>
          <select class="form-select" formControlName="role">
            @for (role of roleOptions; track role) {
              <option [value]="role">{{ role }}</option>
            }
          </select>
        </div>

        <div class="col-md-6 d-flex align-items-end">
          <div class="form-check">
            <input class="form-check-input" id="isActive" type="checkbox" formControlName="isActive" />
            <label class="form-check-label" for="isActive">Utilisateur actif</label>
          </div>
        </div>

        <div class="col-12 d-flex gap-2 justify-content-end mt-3">
          <button class="btn btn-outline-secondary" type="button" (click)="cancel()" [disabled]="submitting">
            Annuler
          </button>
          <button class="btn btn-primary" type="submit" [disabled]="submitting">
            @if (submitting) {
              <span class="spinner-border spinner-border-sm me-2" aria-hidden="true"></span>
            }
            {{ submitLabel }}
          </button>
        </div>
      </form>
    </div>
  </div>
</section>
