<div class="modal fade" [id]="modalId" tabindex="-1" [attr.aria-labelledby]="modalId + 'Label'" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" [id]="modalId + 'Label'">{{ title }}</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fermer" (click)="onCancel()"></button>
      </div>
      <div class="modal-body">
        {{ message }}
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal" (click)="onCancel()">
          {{ cancelLabel }}
        </button>
        <button type="button" class="btn" [class]="confirmClass" data-bs-dismiss="modal" (click)="onConfirm()">
          {{ confirmLabel }}
        </button>
      </div>
    </div>
  </div>
</div>
