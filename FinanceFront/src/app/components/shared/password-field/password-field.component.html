<div class="password-field input-group">
  <input
    [id]="inputId()"
    [type]="visible() ? 'text' : 'password'"
    class="form-control"
    [class.form-control-lg]="large()"
    [value]="value()"
    [attr.autocomplete]="autocomplete()"
    [disabled]="disabled()"
    (input)="onInput($event)"
    (blur)="onBlur()"
  />
  <button
    type="button"
    class="btn btn-outline-secondary password-field-toggle"
    [class.btn-lg]="large()"
    [attr.aria-label]="visible() ? 'Masquer le mot de passe' : 'Afficher le mot de passe'"
    [attr.aria-pressed]="visible()"
    (click)="toggleVisibility()"
  >
    <i class="bi" [class.bi-eye]="!visible()" [class.bi-eye-slash]="visible()"></i>
  </button>
</div>
