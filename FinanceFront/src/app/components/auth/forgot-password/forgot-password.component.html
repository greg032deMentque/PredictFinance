<div class="auth-only">
  <section class="auth-card forgot-card">
    <a class="btn btn-link p-0 text-decoration-none mb-3 d-inline-flex align-items-center gap-1" [routerLink]="toCommands(authPaths.Login)">
      <i class="bi bi-arrow-left"></i> Retour à la connexion
    </a>

    <div class="mb-4">
      <span class="chip chip-navy mb-2"><i class="bi bi-key"></i> Récupération d'accès</span>
      <h1 class="h3 fw-bold mb-2">Mot de passe oublié</h1>
      <p class="muted mb-0">Saisissez votre email pour recevoir un lien de réinitialisation.</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="submit()" class="d-flex flex-column gap-3">
      <div>
        <label class="form-label fw-semibold" for="forgot-password-email">Email</label>
        <input id="forgot-password-email" class="form-control form-control-lg" type="email" formControlName="email" />
        @if (form.controls.email.touched && form.controls.email.invalid) {
          <div class="text-danger small mt-1">Une adresse email valide est requise.</div>
        }
      </div>

      <div class="d-grid">
        <button class="btn btn-lg btn-primary rounded-4 cta-primary" type="submit" [disabled]="submitting">
          @if (submitting) {
            <span class="spinner-border spinner-border-sm me-2" aria-hidden="true"></span>
          }
          <span>Envoyer le lien</span>
        </button>
      </div>
    </form>
  </section>
</div>
