<section class="container py-5">
  <div class="row justify-content-center">
    <div class="col-xl-6 col-lg-7 col-md-9">
      <div class="page-card">
        <div class="mb-4">
          <span class="chip chip-dark mb-2"><i class="bi bi-key"></i> Password reset</span>
          <h1 class="h3 fw-bold mb-2">Réinitialiser le mot de passe</h1>
          <p class="muted mb-0">Renseignez le jeton reçu et définissez un nouveau mot de passe.</p>
        </div>

        <form [formGroup]="form" (ngSubmit)="submit()" class="d-flex flex-column gap-3">
          <div>
            <label class="form-label" for="reset-password-email">Email</label>
            <input id="reset-password-email" class="form-control" type="email" formControlName="email" />
          </div>
          <div>
            <label class="form-label" for="reset-password-token">Jeton</label>
            <input id="reset-password-token" class="form-control" type="text" formControlName="token" />
          </div>
          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label" for="reset-password-password">Nouveau mot de passe</label>
              <input id="reset-password-password" class="form-control" type="password" formControlName="password" />
            </div>
            <div class="col-md-6">
              <label class="form-label" for="reset-password-confirm-password">Confirmation</label>
              <input id="reset-password-confirm-password" class="form-control" type="password" formControlName="confirmPassword" />
            </div>
          </div>

          <button class="btn btn-primary rounded-pill" type="submit" [disabled]="submitting">
            @if (submitting) {
              <span class="spinner-border spinner-border-sm me-2" aria-hidden="true"></span>
            }
            <span>Valider</span>
          </button>

          <a class="btn btn-outline-secondary rounded-pill" [routerLink]="toCommands(authPaths.Login)">Retour à la connexion</a>
        </form>
      </div>
    </div>
  </div>
</section>
