<section class="container-fluid px-0 d-flex flex-column gap-4">
  <div class="card border-0 shadow-sm">
    <div class="card-body d-flex flex-column flex-lg-row justify-content-between align-items-lg-center gap-3">
      <div>
        <p class="text-uppercase text-muted small mb-1">Client</p>
        <h1 class="h3 mb-2">Watchlist</h1>
        <p class="text-body-secondary mb-0">Surface de priorisation des valeurs à revoir, sans recalcul métier côté front.</p>
      </div>

      <div class="d-flex gap-2 flex-wrap">
        <a class="btn btn-outline-secondary" [routerLink]="toCommands(userPaths.Portfolio)">Portfolio</a>
        <a class="btn btn-primary" [routerLink]="toCommands(userPaths.AnalysisEntry)">Analyser</a>
      </div>
    </div>
  </div>

  <app-finance-symbol-selector
    [selectedAsset]="selectedAsset"
    [options]="searchResults"
    [loading]="searchLoading"
    [peaFilterVisible]="true"
    (searchChanged)="onSearchChanged($event)"
    (peaEligibleOnlyChanged)="onPeaFilterChanged($event)"
    (assetSelected)="onAssetSelected($event)"
  />

  <div class="d-flex justify-content-end">
    <button class="btn btn-primary" type="button" (click)="addSelectedAssetToWatchlist()" [disabled]="watchlistLoading || !selectedAsset">
      Ajouter à la watchlist
    </button>
  </div>

  <app-finance-watchlist
    [watchlist]="watchlist"
    [quote]="selectedQuote"
    [quoteLoading]="quoteLoading"
    (requestQuote)="fetchQuote($event)"
    (requestAnalysis)="onAnalyze($event)"
    (removeFromWatchlist)="removeFromWatchlist($event)"
  />
</section>
