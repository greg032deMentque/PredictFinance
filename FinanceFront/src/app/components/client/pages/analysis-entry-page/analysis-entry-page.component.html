<section class="container-fluid px-0 d-flex flex-column gap-4"><div class="card border-0 shadow-sm"><div class="card-body d-flex flex-column flex-lg-row justify-content-between align-items-lg-center gap-3"><div><p class="text-uppercase text-muted small mb-1">Client</p><h1 class="h3 mb-2">Analysis</h1><p class="text-body-secondary mb-0">Sélectionne une valeur puis lance une analyse gouvernée par l’API.</p></div><div class="d-flex gap-2 flex-wrap"><a class="btn btn-outline-secondary" [routerLink]="toCommands(userPaths.Watchlist)">Watchlist</a><a class="btn btn-outline-secondary" [routerLink]="toCommands(userPaths.History)">Historique</a></div></div></div><app-finance-symbol-selector [selectedAsset]="selectedAsset" [options]="searchResults" [loading]="searchLoading" (searchChanged)="onSearchChanged($event)" (assetSelected)="onAssetSelected($event)" /><div class="card border-0 shadow-sm"><div class="card-body d-flex flex-column flex-lg-row justify-content-between align-items-lg-center gap-3"><div><div class="fw-semibold">Valeur sélectionnée</div><div class="text-body-secondary">{{ selectedAsset?.Symbol || 'Aucune valeur sélectionnée' }}</div></div><button class="btn btn-primary" type="button" (click)="launchAnalysis()" [disabled]="analysisLoading || !selectedAsset">{{ analysisLoading ? 'Analyse en cours…' : 'Lancer l’analyse' }}</button></div></div></section>
