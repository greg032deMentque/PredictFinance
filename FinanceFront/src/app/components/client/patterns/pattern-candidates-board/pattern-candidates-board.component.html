<div class="d-flex flex-column gap-2">
  @if (candidates.length === 0) {
    <div class="text-body-secondary small py-3 text-center">Aucun pattern candidat identifié pour cette valeur.</div>
  } @else {
    @for (candidate of sortedCandidates; track candidate.PatternId) {
      <button
        type="button"
        class="btn text-start border rounded-2 p-3 pattern-candidate-btn"
        [class.border-primary]="selectedPatternId === candidate.PatternId"
        [class.shadow-sm]="selectedPatternId !== candidate.PatternId"
        (click)="onSelect(candidate.PatternId)"
      >
        <div class="d-flex justify-content-between align-items-start gap-2 flex-wrap">
          <div>
            <div class="fw-semibold d-flex align-items-center gap-2">
              {{ candidate.DisplayName }}
              @if (candidate.IsPrimary) {
                <span class="badge bg-primary-subtle text-primary-emphasis small">Principal</span>
              }
            </div>
            <div class="small text-body-secondary mt-1">
              <span class="badge me-1 bg-secondary-subtle text-secondary-emphasis">{{ candidate.Phase }}</span>
              <span class="badge" [ngClass]="getConfidenceBadgeClass(candidate.ConfidenceLabel)">{{ candidate.ConfidenceLabel }}</span>
            </div>
          </div>
          <div class="text-end flex-shrink-0">
            <div class="small text-muted">Probabilité de figure</div>
            <div class="fw-semibold">{{ candidate.Probability | percent:'1.0-0' }}</div>
          </div>
        </div>
        @if (candidate.NecklinePrice != null || candidate.InvalidationPrice != null) {
          <div class="mt-2 d-flex gap-3 small text-body-secondary">
            @if (candidate.NecklinePrice != null) {
              <span>Cou : {{ candidate.NecklinePrice | number:'1.2-2' }}</span>
            }
            @if (candidate.InvalidationPrice != null) {
              <span>Invalidation : {{ candidate.InvalidationPrice | number:'1.2-2' }}</span>
            }
          </div>
        }
      </button>
    }
  }
</div>
