<div class="app-root py-3">
  <div class="app-shell" [class.sidebar-collapsed]="sidebarCollapsed()">

    <aside class="sidebar" [class.sidebar--collapsed]="sidebarCollapsed()">

      <!-- Bouton collapse -->
      <button
        class="sidebar-toggle btn btn-sm"
        type="button"
        (click)="toggleSidebar()"
        [title]="sidebarCollapsed() ? 'Déplier le menu' : 'Replier le menu'"
        aria-label="Basculer le menu latéral"
      >
        <i class="bi" [class.bi-chevron-double-left]="!sidebarCollapsed()" [class.bi-chevron-double-right]="sidebarCollapsed()"></i>
      </button>

      <!-- Blocs de navigation -->
      @for (block of menuBlocks; track block.label) {
        <nav class="sidebar-block mb-3">
          @if (!sidebarCollapsed()) {
            <div class="sidebar-section-label">{{ block.label }}</div>
          }
          <ul class="nav flex-column gap-1">
            @for (link of block.links; track link.label) {
              <li class="nav-item">
                <a
                  class="nav-link"
                  [routerLink]="link.commands"
                  routerLinkActive="active"
                  [routerLinkActiveOptions]="{ exact: link.exact ?? true }"
                  (click)="onLinkClick($event, link)"
                  [title]="sidebarCollapsed() ? link.label : ''"
                >
                  @if (link.icon) {
                    <i class="bi" [class]="link.icon" aria-hidden="true"></i>
                  }
                  @if (!sidebarCollapsed()) {
                    <span class="sidebar-link-label">{{ link.label }}</span>
                  }
                </a>
              </li>
            }
          </ul>
        </nav>
      }

    </aside>

    <main class="main-col d-flex flex-column gap-4">
      <router-outlet></router-outlet>
    </main>

  </div>
</div>
