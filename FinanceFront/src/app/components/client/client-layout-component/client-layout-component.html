<div class="app-root py-4 py-lg-4">
  <div class="app-shell">
    <aside class="sidebar">
      <div class="mb-4">
        <div class="text-uppercase small opacity-75 mb-2">Mon espace</div>
        <div class="fw-semibold fs-5">Navigation</div>
      </div>
      <nav class="nav flex-column gap-2 mb-4">
        @for (block of menuBlocks; track block.label) {
          @for (link of block.links; track link.label) {
            <a class="nav-link" [routerLink]="link.commands" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: link.exact ?? true }" (click)="onLinkClick($event, link)">
              @if (link.icon) { <i class="bi" [class]="link.icon"></i> }
              <span>{{ link.label }}</span>
            </a>
          }
        }
      </nav>
    </aside>

    <main class="main-col d-flex flex-column gap-4">
      <router-outlet></router-outlet>
      <div class="footer-divider pt-3 small muted">FinInsight — votre copilote d’investissement au quotidien.</div>
    </main>
  </div>
</div>
