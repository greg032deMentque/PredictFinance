<form [formGroup]="form" (ngSubmit)="submit()" class="d-flex flex-column gap-4">
  <div class="row g-3">
    <div class="col-12">
      <label class="form-label" for="current-password">Mot de passe actuel</label>
      <input id="current-password" class="form-control" type="password" formControlName="currentPassword" />
    </div>
    <div class="col-md-6">
      <label class="form-label" for="new-password">Nouveau mot de passe</label>
      <input id="new-password" class="form-control" type="password" formControlName="newPassword" />
      @if (form.controls.newPassword.touched && form.controls.newPassword.invalid) {
        <div class="text-danger small mt-1">Le mot de passe doit contenir au moins 6 caractères.</div>
      }
    </div>
    <div class="col-md-6">
      <label class="form-label" for="confirm-password">Confirmer le mot de passe</label>
      <input id="confirm-password" class="form-control" type="password" formControlName="confirmPassword" />
    </div>
  </div>

  <div class="d-flex flex-wrap justify-content-between align-items-center gap-3">
    <button class="btn btn-primary rounded-pill" type="submit" [disabled]="submitting">
      @if (submitting) {
        <span class="spinner-border spinner-border-sm me-2" aria-hidden="true"></span>
      }
      <span>Mettre à jour le mot de passe</span>
    </button>
  </div>
</form>
