<section class="d-flex flex-column gap-4">
  <div class="d-flex flex-column flex-lg-row justify-content-between align-items-lg-center gap-3">
    <div>
      <p class="text-uppercase text-secondary fw-semibold small mb-2">Compte</p>
      <h1 class="h3 mb-2">Mon espace personnel</h1>
      <p class="text-secondary mb-0">Le profil courant et la sécurité du compte sont gérés par des projections dédiées côté API.</p>
    </div>
  </div>

  <div class="card border-0 shadow-sm">
    <div class="card-body d-flex flex-column gap-4">
      <nav class="nav nav-pills flex-column flex-md-row gap-2" aria-label="Navigation du compte">
        <a class="btn btn-outline-secondary rounded-pill" [routerLink]="[profileRoute]" routerLinkActive="btn-primary text-white border-0" [routerLinkActiveOptions]="{ exact: true }">
          <i class="bi bi-person me-2"></i>Profil
        </a>
        <a class="btn btn-outline-secondary rounded-pill" [routerLink]="[securityRoute]" routerLinkActive="btn-primary text-white border-0" [routerLinkActiveOptions]="{ exact: true }">
          <i class="bi bi-shield-lock me-2"></i>Sécurité
        </a>
        <a class="btn btn-outline-secondary rounded-pill" [routerLink]="[privacyRoute]" routerLinkActive="btn-primary text-white border-0" [routerLinkActiveOptions]="{ exact: true }">
          <i class="bi bi-toggles me-2"></i>Confidentialité
        </a>
        <a class="btn btn-outline-secondary rounded-pill" [routerLink]="[alertsRoute]" routerLinkActive="btn-primary text-white border-0" [routerLinkActiveOptions]="{ exact: true }">
          <i class="bi bi-bell me-2"></i>Alertes
        </a>
        <a class="btn btn-outline-secondary rounded-pill" [routerLink]="[dataExportRoute]" routerLinkActive="btn-primary text-white border-0" [routerLinkActiveOptions]="{ exact: true }">
          <i class="bi bi-download me-2"></i>Export
        </a>
        <a class="btn btn-outline-danger rounded-pill" [routerLink]="[deleteAccountRoute]" routerLinkActive="btn-danger text-white border-0" [routerLinkActiveOptions]="{ exact: true }">
          <i class="bi bi-trash me-2"></i>Supprimer
        </a>
      </nav>

      <router-outlet></router-outlet>
    </div>
  </div>
</section>
