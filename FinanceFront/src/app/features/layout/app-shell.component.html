<div class="shell-wrapper">
  <header class="topbar border-bottom">
    <nav class="navbar navbar-expand-lg">
      <div class="container-fluid">
        <a class="navbar-brand d-flex align-items-center gap-2" routerLink="/app/dashboard">
          <span class="brand-dot"></span>
          <span class="fw-semibold">PredictFinance</span>
        </a>

        <div class="ms-auto d-flex align-items-center gap-3">
          <div class="text-end d-none d-md-block">
            <p class="small text-muted mb-0">Connecte</p>
            <p class="mb-0 fw-semibold">{{ sessionService.displayName() }}</p>
          </div>
          <button class="btn btn-outline-danger btn-sm" (click)="logout()">Se deconnecter</button>
        </div>
      </div>
    </nav>
  </header>

  <div class="container-fluid shell-content">
    <div class="row g-0">
      <aside class="col-12 col-md-3 col-lg-2 sidebar border-end">
        <div class="p-3 p-lg-4">
          <p class="text-uppercase sidebar-title mb-3">Menu</p>
          <div class="nav flex-column gap-2">
            <a routerLink="/app/dashboard" routerLinkActive="active" class="nav-link shell-link">
              <i class="bi bi-graph-up-arrow"></i>
              <span>Dashboard</span>
            </a>
            <button type="button" class="nav-link shell-link disabled" disabled>
              <i class="bi bi-clock-history"></i>
              <span>Historique</span>
            </button>
            <button type="button" class="nav-link shell-link disabled" disabled>
              <i class="bi bi-sliders2"></i>
              <span>Parametres</span>
            </button>
          </div>
        </div>
      </aside>

      <main class="col-12 col-md-9 col-lg-10 main-panel">
        <div class="p-3 p-md-4 p-xl-5">
          <router-outlet />
        </div>
      </main>
    </div>
  </div>
</div>
